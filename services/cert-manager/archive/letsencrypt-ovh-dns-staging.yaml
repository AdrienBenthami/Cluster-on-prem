apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-ovh-dns-staging
spec:
  acme:
    email: <your-email@example.com>
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-ovh-dns-staging-account-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.benthami.eu
            solverName: ovh
            config:
              endpoint: ovh-eu
              authenticationMethod: application
              applicationKeyRef:
                name: ovh-dns-credentials
                key: applicationKey
              applicationSecretRef:
                name: ovh-dns-credentials
                key: applicationSecret
              consumerKeyRef:
                name: ovh-dns-credentials
                key: consumerKey
