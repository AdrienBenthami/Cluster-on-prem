apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging-acme-dns
spec:
  acme:
    email: <your-email@example.com>
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-acme-dns-account-key
    solvers:
      - dns01:
          acmeDNS:
            host: http://acme-dns-api.acme-dns.svc.cluster.local:8080
            accountSecretRef:
              name: acme-dns-auth
              key: acme-dns-auth.json
